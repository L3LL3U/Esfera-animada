<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera Game Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="interface">
        <h1 id="instrucao">Clique na esfera para começar!</h1>
        <div class="stats">
            <div class="stat-box">
                <span class="label">PONTOS</span>
                <span id="pontos" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">TEMPO</span>
                <span id="timer" class="value">--</span>
            </div>
        </div>
    </div>

    <div class="esfera" id="minhaEsfera"></div>

    <script src="script.js"></script>
</body>
</html>
